version: '3'

vars:
  ADDR: '{{default ":8080" .ADDR}}'
  WEB_PORT: '{{default "9000" .WEB_PORT}}'
  DOCKER_IMAGE_REPO: '{{default "" .DOCKER_IMAGE_REPO}}'
  DOCKER_PLATFORMS: '{{default "" .DOCKER_PLATFORMS}}'
  DOCKER_PORT: '{{default "" .DOCKER_PORT}}'

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list-all

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w *.go

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  check:
    desc: Run tidy, fmt, and tests
    cmds:
      - task: tidy
      - task: fmt
      - task: test

  'run:http':
    desc: Start local HTTP server for development
    cmds:
      - go run . -mode=http -addr='{{.ADDR}}'

  'run:web':
    desc: Start local server with Web Function compatible PORT
    cmds:
      - PORT='{{.WEB_PORT}}' go run . -mode=web

  build:
    desc: Build Tencent Cloud Web Function package for Function URL
    cmds:
      - ./scripts/build-web.sh

  'docker:version':
    desc: Print Docker image version from VERSION
    cmds:
      - bash ./scripts/docker-release.sh version

  'docker:build':
    desc: Build and load the local-architecture Docker image
    cmds:
      - DOCKER_IMAGE_REPO='{{.DOCKER_IMAGE_REPO}}' DOCKER_PLATFORMS='{{.DOCKER_PLATFORMS}}' bash ./scripts/docker-release.sh build

  'docker:run':
    desc: Run the local Docker image on port 30662
    cmds:
      - DOCKER_IMAGE_REPO='{{.DOCKER_IMAGE_REPO}}' DOCKER_PORT='{{.DOCKER_PORT}}' bash ./scripts/docker-release.sh run

  'docker:publish':
    desc: Publish multi-arch Docker images to Docker Hub and update latest
    cmds:
      - DOCKER_IMAGE_REPO='{{.DOCKER_IMAGE_REPO}}' DOCKER_PLATFORMS='{{.DOCKER_PLATFORMS}}' bash ./scripts/docker-release.sh publish

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist
